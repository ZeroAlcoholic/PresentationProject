<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DocAI 互動探索工作台</title>
  <style>
:root {
  --bg: #f3ede2;
  --panel: rgba(252, 249, 242, 0.92);
  --panel-strong: #fffdf8;
  --line: #d7cfbf;
  --soft-line: rgba(21, 34, 49, 0.12);
  --ink: #152231;
  --muted: #6b7787;
  --accent: #0b5d7a;
  --accent-soft: rgba(11, 93, 122, 0.12);
  --warm: #9b5d2d;
  --warm-soft: rgba(155, 93, 45, 0.14);
  --shadow: 0 20px 54px rgba(21, 34, 49, 0.08);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", sans-serif;
  color: var(--ink);
  background:
    radial-gradient(circle at top left, rgba(255, 247, 233, 0.96), transparent 28%),
    radial-gradient(circle at bottom right, rgba(11, 93, 122, 0.1), transparent 34%),
    linear-gradient(180deg, #f8f2e9 0%, var(--bg) 100%);
}
input, select, button { font: inherit; }
button { border: none; }
.eyebrow {
  margin: 0 0 6px;
  font-size: 0.76rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--muted);
}
.app-shell {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 320px minmax(0, 1fr);
}
.sidebar {
  padding: 24px 20px;
  border-right: 1px solid var(--soft-line);
  background: rgba(252, 249, 242, 0.8);
  backdrop-filter: blur(14px);
  display: grid;
  gap: 16px;
  align-content: start;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow: auto;
}
.brand-block h1, .hero h2, .map-head h2, .inspector h2 { margin: 0; }
.brand-block p:last-child {
  margin: 10px 0 0;
  color: var(--muted);
  line-height: 1.68;
}
.sidebar-card, .panel {
  border-radius: 24px;
  border: 1px solid var(--soft-line);
  background: var(--panel);
  box-shadow: var(--shadow);
}
.sidebar-card { padding: 16px; }
.overview-stats {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}
.stat-box, .badge, .preset-button {
  border-radius: 18px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.82);
}
.stat-box {
  padding: 12px;
  display: grid;
  gap: 4px;
}
.stat-box strong { font-size: 1rem; }
.stat-box span { color: var(--muted); font-size: .82rem; }
.control-card {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}
.control-block { display: grid; gap: 6px; }
.control-block-wide { grid-column: 1 / -1; }
.control-block label {
  font-size: .76rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--muted);
}
.control-block input, .control-block select {
  width: 100%;
  padding: 11px 12px;
  border-radius: 14px;
  border: 1px solid var(--line);
  background: var(--panel-strong);
}
.preset-list { display: flex; flex-wrap: wrap; gap: 8px; }
.preset-button {
  padding: 10px 12px;
  cursor: pointer;
}
.preset-button.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.legend-card ul {
  padding-left: 18px;
  margin: 0;
  display: grid;
  gap: 8px;
  color: var(--muted);
  line-height: 1.58;
}
.main {
  padding: 24px;
  display: grid;
  gap: 18px;
  align-content: start;
}
.hero {
  padding: 24px 26px;
  display: grid;
  gap: 14px;
  background:
    linear-gradient(140deg, rgba(255,255,255,.94), rgba(248,243,234,.84)),
    linear-gradient(180deg, rgba(11,93,122,.05), transparent 60%);
}
.hero p { margin: 0; color: var(--muted); line-height: 1.68; }
.hero-pills, .badge-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.badge {
  padding: 8px 10px;
  font-size: .82rem;
}
.mark-row, .node-marks {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.mark, .node-mark {
  display: inline-flex;
  align-items: center;
  padding: 4px 7px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.86);
  color: var(--muted);
  font-size: .7rem;
  letter-spacing: .04em;
}
.mark-delivery-self-build, .node-mark-delivery-self-build { color: #5d4b16; }
.mark-delivery-integration, .node-mark-delivery-integration { color: #355070; }
.mark-delivery-research, .node-mark-delivery-research { color: #7a2340; }
.mark-stack-dl, .node-mark-stack-dl { color: #7a4c29; }
.mark-stack-llm, .node-mark-stack-llm { color: #0b5d7a; }
.mark-stack-hybrid, .node-mark-stack-hybrid { color: #2f6f4f; }
.mark-stack-ops, .node-mark-stack-ops { color: #5f6b78; }
.mark-adaptation-finetune, .node-mark-adaptation-finetune { color: #7a2340; }
.mark-adaptation-prompt, .node-mark-adaptation-prompt { color: #0b5d7a; }
.mark-adaptation-domain-data, .node-mark-adaptation-domain-data { color: #5d6b58; }
.mark-adaptation-none, .node-mark-adaptation-none { color: #6b7280; }
.canvas-layout {
  display: grid;
  grid-template-columns: minmax(0, 1.35fr) 360px;
  gap: 18px;
  align-items: start;
}
.map {
  padding: 18px;
  display: grid;
  gap: 16px;
}
.map-head {
  display: flex;
  justify-content: space-between;
  gap: 14px;
  align-items: end;
}
.map-head p:last-child {
  max-width: 360px;
  text-align: right;
  color: var(--muted);
  margin: 0;
  line-height: 1.6;
}
.map-stage {
  position: relative;
  min-height: 900px;
  border-radius: 22px;
  overflow: auto;
  border: 1px dashed rgba(11, 93, 122, 0.22);
  background:
    linear-gradient(180deg, rgba(255,255,255,.72), rgba(248,243,234,.88));
}
#graphEdges, #graphNodes {
  position: absolute;
  inset: 0;
}
.lane-label {
  position: absolute;
  left: 18px;
  font-size: .75rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
}
.lane-band {
  position: absolute;
  left: 10px;
  right: 10px;
  border-radius: 22px;
  border: 1px solid rgba(11,93,122,.08);
  background: rgba(255,255,255,.34);
}
.node-card {
  position: absolute;
  width: 232px;
  min-height: 116px;
  padding: 14px 15px;
  border-radius: 20px;
  border: 1px solid var(--soft-line);
  background: rgba(255,255,255,.96);
  box-shadow: 0 14px 30px rgba(21,34,49,.08);
  cursor: pointer;
  transition: transform .18s ease, opacity .18s ease, border-color .18s ease, background .18s ease;
  text-align: left;
}
.node-card:hover { transform: translateY(-2px); }
.node-card.active {
  border-color: var(--accent);
  background: linear-gradient(180deg, rgba(11,93,122,.08), rgba(255,255,255,.98));
  box-shadow: 0 18px 40px rgba(11,93,122,.18);
}
.node-card.related {
  border-color: rgba(155,93,45,.26);
  background: #fff7ef;
}
.node-card.dim { opacity: .26; box-shadow: none; }
.node-card h3 { margin: 0; font-size: .98rem; line-height: 1.35; }
.node-card p {
  margin: 6px 0 0;
  color: var(--muted);
  font-size: .84rem;
  line-height: 1.46;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.node-marks {
  margin-top: 10px;
}
.node-meta {
  display: inline-flex;
  margin-bottom: 8px;
  color: var(--warm);
  font-size: .72rem;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.empty-state {
  position: absolute;
  inset: 20px;
  display: grid;
  place-items: center;
  border: 1px dashed rgba(11,93,122,.24);
  border-radius: 18px;
  color: var(--muted);
  background: rgba(255,255,255,.7);
}
.edge-line {
  fill: none;
  stroke: rgba(21,34,49,.09);
  stroke-width: 2;
}
.edge-line.emphasis {
  stroke: rgba(11,93,122,.46);
  stroke-width: 2.5;
}
.edge-line.dim {
  stroke: rgba(21,34,49,.05);
}
.inspector {
  padding: 20px;
  display: grid;
  gap: 16px;
  position: sticky;
  top: 24px;
}
.detail-lead, .secondary {
  margin: 0;
  color: var(--muted);
  line-height: 1.7;
}
.inspect-grid {
  display: grid;
  gap: 12px;
}
.inspect-block {
  display: grid;
  gap: 8px;
}
.inspect-block h3 {
  margin: 0;
  font-size: .78rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
}
.note-block {
  padding: 14px;
  border-radius: 18px;
  background: linear-gradient(180deg, rgba(155,93,45,.08), rgba(255,255,255,.8));
  border: 1px solid rgba(155,93,45,.18);
}
@media (max-width: 1220px) {
  .app-shell { grid-template-columns: 1fr; }
  .sidebar {
    position: static;
    height: auto;
    border-right: none;
    border-bottom: 1px solid var(--soft-line);
  }
  .canvas-layout { grid-template-columns: 1fr; }
  .inspector { position: static; }
}
@media (max-width: 760px) {
  .main, .sidebar { padding: 16px; }
  .control-card { grid-template-columns: 1fr; }
  .overview-stats { grid-template-columns: 1fr 1fr; }
  .map-head { display: grid; }
}
.detail-list {
  margin: 0;
  padding-left: 18px;
  display: grid;
  gap: 6px;
  color: var(--muted);
  line-height: 1.58;
}
.detail-list li { margin: 0; }
.view-tabs {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
}
.view-tab {
  padding: 12px 14px;
  border-radius: 18px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.82);
  text-align: left;
  cursor: pointer;
}
.view-tab strong {
  display: block;
  font-size: .92rem;
}
.view-tab span {
  display: block;
  margin-top: 4px;
  font-size: .8rem;
  color: var(--muted);
}
.view-tab.active {
  border-color: var(--accent);
  background: linear-gradient(180deg, rgba(11,93,122,.08), rgba(255,255,255,.98));
  box-shadow: 0 14px 30px rgba(11,93,122,.12);
}

</style>
</head>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-block"><p class="eyebrow">Interactive Workbench</p><h1>文件智慧探索工作台</h1><p>同一份資料，切換結構、技術、場景與研究視角。</p></div>
      <section class="sidebar-card overview-card"><p class="eyebrow">總覽</p><div class="overview-stats" id="summaryStats"></div></section>
      <section class="sidebar-card view-card"><p class="eyebrow">工作視圖</p><div class="view-tabs" id="viewTabs"></div></section>
      <section class="sidebar-card control-card">
        <div class="control-block control-block-wide"><label for="searchInput">搜尋</label><input id="searchInput" type="search" placeholder="搜尋節點、技術標記、風險或應用場景"></div>
        <div class="control-block"><label for="modeSelect">關聯視圖</label><select id="modeSelect"></select></div>
        <div class="control-block"><label for="layerSelect">層級</label><select id="layerSelect"></select></div>
        <div class="control-block"><label for="familySelect">技術家族</label><select id="familySelect"></select></div>
        <div class="control-block"><label for="tagSelect">技術標記</label><select id="tagSelect"></select></div>
        <div class="control-block"><label for="useCaseSelect">應用場景</label><select id="useCaseSelect"></select></div>
      </section>
      <section class="sidebar-card preset-card"><p class="eyebrow">預設視角</p><div class="preset-list" id="presetStrip"></div></section>
      <section class="sidebar-card legend-card"><p class="eyebrow">圖例</p><ul><li>深色節點：目前選取</li><li>淺色節點：目前關聯</li><li>淡化節點：目前視圖外圍</li><li>強調連線：目前關聯路徑</li></ul></section>
    </aside>
    <main class="main">
      <section class="hero panel"><div><p class="eyebrow">Workbench</p><h2 id="heroTitle"></h2></div><p id="heroText"></p><div class="hero-pills" id="heroPills"></div></section>
      <section class="canvas-layout">
        <section class="map panel"><div class="map-head"><div><p class="eyebrow" id="mapEyebrow">Map View</p><h2 id="mapTitle">技能樹地圖</h2></div><p id="graphHint"></p></div><div class="map-stage" id="graphStage"><svg id="graphEdges"></svg><div id="graphNodes"></div></div></section>
        <aside class="inspector panel">
          <div><p class="eyebrow">Inspector</p><h2 id="detailTitle"></h2></div>
          <p class="detail-lead" id="detailSummary"></p>
          <div class="badge-row" id="detailTags"></div><div class="mark-row" id="detailMarks"></div>
          <div class="inspect-grid">
            <section class="inspect-block"><h3>輸入</h3><div class="badge-row" id="detailInput"></div></section>
            <section class="inspect-block"><h3>輸出</h3><div class="badge-row" id="detailOutput"></div></section>
            <section class="inspect-block"><h3>依賴</h3><div class="badge-row" id="detailDependencies"></div></section>
            <section class="inspect-block"><h3>應用場景</h3><div class="badge-row" id="detailUseCases"></div></section>
            <section class="inspect-block"><h3>指標</h3><div class="badge-row" id="detailMetrics"></div></section>
            <section class="inspect-block"><h3>代表來源</h3><div class="badge-row" id="detailReferences"></div></section><section class="inspect-block"><h3>開發判讀</h3><ul class="detail-list" id="detailImplementation"></ul></section>
          </div>
          <section class="inspect-block"><h3>優勢</h3><ul class="detail-list" id="detailStrengths"></ul></section>
          <section class="inspect-block"><h3>限制</h3><ul class="detail-list" id="detailWeaknesses"></ul></section>
          <section class="inspect-block note-block"><h3>失敗模式</h3><ul class="detail-list" id="detailFailureModes"></ul></section>
          <section class="inspect-block note-block"><h3>Technique Card</h3><p class="detail-lead" id="detailDefinition"></p><p class="detail-lead" id="detailMechanism"></p><ul class="detail-list" id="detailNotes"></ul></section><section class="inspect-block note-block"><h3>白皮書軸線</h3><div class="badge-row" id="detailAxes"></div></section>
        </aside>
      </section>
    </main>
  </div>

  <script>
const data = window.DOCAI_SKILL_TREE_DATA;
const CARD_WIDTH = 232;
const CARD_HEIGHT = 116;
const nodes = new Map(data.nodes.map((node) => [node.id, node]));
const children = new Map();
data.nodes.forEach((node) => {
  if (!node.parent) return;
  if (!children.has(node.parent)) children.set(node.parent, []);
  children.get(node.parent).push(node.id);
});

const taxonomy = data.metadata.taxonomy || {};
const familyLabel = (id) => taxonomy.families?.[id] || id;
const tagLabel = (id) => taxonomy.tags?.[id] || id;
const useCaseLabel = (id) => taxonomy.use_cases?.[id] || id;
const modeLabel = (id) => taxonomy.view_modes?.[id] || id;
const implementationLabels = taxonomy.implementation || {};
const implementationLabel = (group, id) => implementationLabels?.[group]?.[id] || id;
const workbenchViews = data.metadata.workbench_views || [
  { id: "tree", label: "技能樹", description: "完整能力主幹與相鄰關聯", focus_nodes: [data.metadata.root_id] },
  { id: "evaluation", label: "評測地圖", description: "從指標、benchmark 與 observability 反看系統品質", focus_nodes: ["evaluation-data"] },
  { id: "scenario", label: "場景架構", description: "依應用場景讀取處理鏈、風險與治理", default_use_case: "medical-claims", focus_nodes: ["input-routing", "preprocessing", "recognition", "structure", "parsing", "ops"] }
];

const defaultSelected = data.metadata.default_selected_id || (children.get(data.metadata.root_id) || [])[0] || data.metadata.root_id;
const state = {
  selected: defaultSelected,
  search: "",
  mode: "selected",
  layer: "",
  family: "",
  tag: "",
  useCase: "",
  preset: "",
  workspaceView: workbenchViews[0]?.id || "tree"
};

const q = (id) => document.getElementById(id);
const stage = q("graphStage");
const nodeLayer = q("graphNodes");
const edgeLayer = q("graphEdges");
const layers = data.metadata.layer_order || [];
const families = [...new Set(data.nodes.map((node) => node.family))].filter(Boolean).sort((a, b) => familyLabel(a).localeCompare(familyLabel(b), "zh-Hant"));
const tags = [...new Set(data.nodes.flatMap((node) => node.tags || []))].filter(Boolean).sort((a, b) => tagLabel(a).localeCompare(tagLabel(b), "zh-Hant"));
const useCases = [...new Set(data.nodes.flatMap((node) => node.use_cases || []))].filter(Boolean).sort((a, b) => useCaseLabel(a).localeCompare(useCaseLabel(b), "zh-Hant"));

const fillSelect = (id, allLabel, values, labeler = (value) => value) => {
  q(id).innerHTML = `<option value="">全部${allLabel}</option>${values.map((value) => `<option value="${value}">${labeler(value)}</option>`).join("")}`;
};

q("modeSelect").innerHTML = [
  ["selected", modeLabel("selected")],
  ["subtree", modeLabel("subtree")],
  ["family", modeLabel("family")],
  ["layer", modeLabel("layer")],
  ["tag", modeLabel("tag")],
  ["use_case", modeLabel("use_case")],
  ["preset", modeLabel("preset")]
].map(([value, label]) => `<option value="${value}">${label}</option>`).join("");
fillSelect("layerSelect", "層級", layers);
fillSelect("familySelect", "技術家族", families, familyLabel);
fillSelect("tagSelect", "技術標記", tags, tagLabel);
fillSelect("useCaseSelect", "應用場景", useCases, useCaseLabel);
q("modeSelect").value = state.mode;

const presetStrip = q("presetStrip");
data.highlight_presets.forEach((preset) => {
  const button = document.createElement("button");
  button.className = "preset-button";
  button.dataset.id = preset.id;
  button.title = preset.description;
  button.textContent = preset.label;
  button.addEventListener("click", () => {
    state.mode = "preset";
    state.preset = preset.id;
    q("modeSelect").value = "preset";
    render();
  });
  presetStrip.appendChild(button);
});

const viewTabs = q("viewTabs");
workbenchViews.forEach((view) => {
  const button = document.createElement("button");
  button.className = "view-tab";
  button.dataset.id = view.id;
  button.innerHTML = `<strong>${view.label}</strong><span>${view.description}</span>`;
  button.addEventListener("click", () => {
    state.workspaceView = view.id;
    if (view.id === "scenario" && !state.useCase && view.default_use_case) {
      state.useCase = view.default_use_case;
      q("useCaseSelect").value = state.useCase;
    }
    render();
  });
  viewTabs.appendChild(button);
});

const currentView = () => workbenchViews.find((view) => view.id === state.workspaceView) || workbenchViews[0];
const ancestors = (id) => {
  const result = [];
  let current = nodes.get(id);
  while (current && current.parent) {
    result.push(current.parent);
    current = nodes.get(current.parent);
  }
  return result;
};
const descendants = (id) => {
  const found = new Set([id]);
  (children.get(id) || []).forEach((child) => descendants(child).forEach((value) => found.add(value)));
  return found;
};
const directDependents = (id) => data.nodes.filter((node) => (node.dependencies || []).includes(id)).map((node) => node.id);
const presetMatches = (preset) => new Set(preset.focus.nodes || []);
const inflateIds = (seedIds) => {
  const set = new Set(seedIds.filter(Boolean));
  seedIds.forEach((id) => {
    if (!nodes.has(id)) return;
    set.add(id);
    ancestors(id).forEach((value) => set.add(value));
    (nodes.get(id).dependencies || []).forEach((value) => set.add(value));
    directDependents(id).forEach((value) => set.add(value));
    (children.get(id) || []).forEach((value) => set.add(value));
  });
  set.add(data.metadata.root_id);
  return set;
};
const currentScenario = () => {
  const view = currentView();
  const targetUseCase = state.useCase || view.default_use_case || (nodes.get(state.selected)?.use_cases || [])[0];
  return (view.scenarios || []).find((scenario) => scenario.use_case === targetUseCase) || null;
};
const evaluationViewIds = () => {
  const view = currentView();
  const seeds = [
    ...(view.focus_nodes || []),
    ...(view.metric_nodes || []),
    ...(view.benchmark_nodes || []),
    ...(view.support_nodes || [])
  ];
  return inflateIds(seeds);
};
const scenarioViewIds = () => {
  const view = currentView();
  const scenario = currentScenario();
  const seeds = [data.metadata.root_id, ...(view.focus_nodes || []), ...(scenario?.route_nodes || []), ...(scenario?.governance_nodes || [])];
  const targetUseCase = scenario?.use_case || state.useCase || view.default_use_case;
  if (targetUseCase) {
    data.nodes.filter((node) => (node.use_cases || []).includes(targetUseCase)).forEach((node) => seeds.push(node.id));
  }
  return inflateIds(seeds);
};
const viewNodeSet = () => {
  if (state.workspaceView === "evaluation") return evaluationViewIds();
  if (state.workspaceView === "scenario") return scenarioViewIds();
  return null;
};
const searchHaystack = (node) => [
  node.label,
  node.summary,
  familyLabel(node.family),
  implementationLabel("delivery", node.implementation?.delivery),
  implementationLabel("stack", node.implementation?.stack),
  implementationLabel("adaptation", node.implementation?.adaptation),
  implementationLabel("effort", node.implementation?.effort),
  node.implementation?.build_reason,
  node.implementation?.tuning_reason,
  ...(node.tags || []).map(tagLabel),
  ...(node.use_cases || []).map(useCaseLabel),
  ...(node.strengths || []),
  ...(node.weaknesses || []),
  ...(node.failure_modes || []),
  ...(node.references || [])
].join(" ").toLowerCase();

const visibleNodes = () => {
  const viewSet = viewNodeSet();
  return data.nodes.filter((node) => {
    if (viewSet && !viewSet.has(node.id)) return false;
    if (state.search && !searchHaystack(node).includes(state.search)) return false;
    if (state.layer && node.layer !== state.layer) return false;
    if (state.family && node.family !== state.family) return false;
    if (state.tag && !(node.tags || []).includes(state.tag)) return false;
    if (state.useCase && !(node.use_cases || []).includes(state.useCase) && state.workspaceView !== "scenario") return false;
    return true;
  });
};

const activeSet = () => {
  const node = nodes.get(state.selected);
  if (!node) return new Set();
  if (node.id === data.metadata.root_id && state.mode === "selected") return new Set([node.id]);
  if (state.mode === "subtree") {
    const set = descendants(node.id);
    ancestors(node.id).forEach((id) => set.add(id));
    return set;
  }
  if (state.mode === "family") return new Set(data.nodes.filter((item) => item.family === node.family).map((item) => item.id));
  if (state.mode === "layer") return new Set(data.nodes.filter((item) => item.layer === node.layer).map((item) => item.id));
  if (state.mode === "tag") {
    const target = state.tag || (node.tags || [])[0];
    return new Set(data.nodes.filter((item) => (item.tags || []).includes(target)).map((item) => item.id));
  }
  if (state.mode === "use_case") {
    const target = state.useCase || (node.use_cases || [])[0];
    return new Set(data.nodes.filter((item) => (item.use_cases || []).includes(target)).map((item) => item.id));
  }
  if (state.mode === "preset" && state.preset) {
    const preset = data.highlight_presets.find((item) => item.id === state.preset);
    return preset ? presetMatches(preset) : new Set([node.id]);
  }
  const set = new Set([node.id]);
  ancestors(node.id).forEach((id) => set.add(id));
  (children.get(node.id) || []).forEach((id) => set.add(id));
  (node.dependencies || []).forEach((id) => set.add(id));
  directDependents(node.id).forEach((id) => set.add(id));
  return set;
};

const badgeRow = (id, values, mapper = (value) => value, fallback = "未填") => {
  q(id).innerHTML = (values && values.length ? values : [fallback]).map((value) => `<span class="badge">${mapper(value)}</span>`).join("");
};
const implementationMarks = (node, prefix = "mark") => {
  const impl = node.implementation || {};
  const marks = [
    ["delivery", impl.delivery],
    ["stack", impl.stack],
    ["adaptation", impl.adaptation]
  ].filter(([, value]) => value);
  return marks.map(([group, value]) => `<span class="${prefix} ${prefix}-${group}-${value}">${implementationLabel(group, value)}</span>`).join("");
};
const listBlock = (id, values, fallback = "未填") => {
  q(id).innerHTML = (values && values.length ? values : [fallback]).slice(0, 6).map((value) => `<li>${value}</li>`).join("");
};

const viewHeroText = (view, selected) => {
  if (view.id === "evaluation") return `以指標節點、benchmark 與支撐能力檢查 ${selected.label} 的驗收位置。`;
  if (view.id === "scenario") {
    const scenario = currentScenario();
    const label = scenario?.label || useCaseLabel(state.useCase || view.default_use_case || "medical-claims");
    return `以 ${label} 的處理鏈、治理節點與常見風險來閱讀 ${selected.label}。`;
  }
  return `${selected.layer} · ${familyLabel(selected.family)} · ${selected.summary}`;
};

const renderSummary = (visible, active) => {
  const selected = nodes.get(state.selected);
  const view = currentView();
  q("summaryStats").innerHTML = [
    ["節點", data.nodes.length],
    ["可見", visible.length],
    ["聚焦", active.size || 1],
    ["主幹", (children.get(data.metadata.root_id) || []).length]
  ].map(([label, value]) => `<div class="stat-box"><strong>${value}</strong><span>${label}</span></div>`).join("");
  q("heroTitle").textContent = `${view.label} · ${selected.label}`;
  q("heroText").textContent = viewHeroText(view, selected);
  const scenario = view.id === "scenario" ? currentScenario() : null;
  q("heroPills").innerHTML = [
    `工作視圖 ${view.label}`,
    view.id === "evaluation" ? `評測節點 ${(view.metric_nodes || []).length}` : `技術家族 ${familyLabel(selected.family)}`,
    view.id === "scenario" ? `場景 ${scenario?.label || useCaseLabel(state.useCase || view.default_use_case || "medical-claims")}` : `指標 ${(selected.evaluation_metrics || []).length}`,
    `場景 ${(selected.use_cases || []).length}`
  ].map((text) => `<span class="badge">${text}</span>`).join("");
  q("mapEyebrow").textContent = view.label;
  q("mapTitle").textContent = view.id === "evaluation" ? "評測地圖" : view.id === "scenario" ? "場景架構" : "技能樹地圖";
};

const renderDetail = () => {
  const node = nodes.get(state.selected);
  const card = data.technique_cards?.[node.id] || {};
  badgeRow("detailTags", node.tags, tagLabel, "尚未標記");
  q("detailMarks").innerHTML = implementationMarks(node);
  badgeRow("detailInput", node.input, (value) => value);
  badgeRow("detailOutput", node.output, (value) => value);
  badgeRow("detailDependencies", (node.dependencies || []).map((id) => nodes.get(id)?.label || id), (value) => value);
  badgeRow("detailUseCases", node.use_cases, useCaseLabel, "未指定");
  badgeRow("detailMetrics", [...new Set([...(node.evaluation_metrics || []), ...(card.evaluation_metrics || [])])], (value) => value, "未定義");
  badgeRow("detailReferences", node.references || [], (value) => value, "共享資料");
  listBlock("detailStrengths", node.strengths, "待補");
  listBlock("detailWeaknesses", node.weaknesses, "待補");
  listBlock("detailFailureModes", node.failure_modes, "待補");
  listBlock("detailNotes", card.engineering_notes, "待補");
  listBlock("detailImplementation", [
    `開發模式：${implementationLabel("delivery", node.implementation?.delivery) || "未定義"} · 難度 ${implementationLabel("effort", node.implementation?.effort) || "未定義"}`,
    `技術型態：${implementationLabel("stack", node.implementation?.stack) || "未定義"}`,
    `調整需求：${implementationLabel("adaptation", node.implementation?.adaptation) || "未定義"}`,
    node.implementation?.build_reason || "待補自建 / 整合判斷",
    node.implementation?.tuning_reason || "待補微調判斷"
  ], "待補");
  badgeRow("detailAxes", node.id === data.metadata.root_id ? (data.metadata.whitepaper_axes || []).map((axis) => axis.label) : [familyLabel(node.family), node.layer], (value) => value, "未定義");
  q("detailTitle").textContent = node.label;
  q("detailSummary").textContent = node.summary;
  q("detailDefinition").textContent = card.definition || "";
  q("detailMechanism").textContent = card.mechanism || "";
};

const buildVisibleChildren = (visibleIds) => {
  const visibleChildren = new Map();
  visibleIds.forEach((id) => visibleChildren.set(id, []));
  data.nodes.forEach((node) => {
    if (!node.parent) return;
    if (!visibleIds.has(node.id) || !visibleIds.has(node.parent)) return;
    visibleChildren.get(node.parent).push(node.id);
  });
  visibleChildren.forEach((list) => list.sort((a, b) => nodes.get(a).label.localeCompare(nodes.get(b).label, "zh-Hant")));
  return visibleChildren;
};

const computeTreeLayout = (rootId, visibleChildren) => {
  const leafGap = 144;
  const levelGap = 300;
  const topPad = 56;
  const leftPad = 72;
  const positions = new Map();
  let cursor = 0;
  let maxDepth = 0;

  const walk = (id, depth) => {
    maxDepth = Math.max(maxDepth, depth);
    const kids = visibleChildren.get(id) || [];
    if (!kids.length) {
      const y = topPad + cursor * leafGap;
      cursor += 1;
      positions.set(id, { x: leftPad + depth * levelGap, y, depth });
      return y;
    }
    const childYs = kids.map((child) => walk(child, depth + 1));
    const y = (childYs[0] + childYs[childYs.length - 1]) / 2;
    positions.set(id, { x: leftPad + depth * levelGap, y, depth });
    return y;
  };

  walk(rootId, 0);
  return {
    positions,
    width: leftPad + (maxDepth + 1) * levelGap + 320,
    height: Math.max(860, topPad + Math.max(cursor, 1) * leafGap + 64)
  };
};

const renderGraph = (visible) => {
  const visibleIds = new Set(visible.map((node) => node.id));
  if (!visible.length) {
    nodeLayer.innerHTML = `<div class="empty-state">目前條件下沒有可顯示節點。</div>`;
    edgeLayer.innerHTML = "";
    q("graphHint").textContent = "目前條件下沒有符合節點";
    return new Set();
  }
  if (!visibleIds.has(state.selected)) state.selected = visible[0]?.id || defaultSelected;
  const active = activeSet();
  const visibleChildren = buildVisibleChildren(visibleIds);
  const layout = computeTreeLayout(data.metadata.root_id, visibleChildren);
  stage.style.minHeight = `${layout.height}px`;
  edgeLayer.setAttribute("viewBox", `0 0 ${layout.width} ${layout.height}`);
  edgeLayer.setAttribute("width", layout.width);
  edgeLayer.setAttribute("height", layout.height);
  nodeLayer.style.width = `${layout.width}px`;
  nodeLayer.style.height = `${layout.height}px`;

  nodeLayer.innerHTML = visible.map((node) => {
    const pos = layout.positions.get(node.id);
    if (!pos) return "";
    const isActive = active.has(node.id) || node.id === state.selected;
    return `<button class="node-card ${node.id === state.selected ? "active" : ""} ${active.size && !isActive ? "dim" : ""} ${isActive && node.id !== state.selected ? "related" : ""}" data-id="${node.id}" style="left:${pos.x}px;top:${pos.y}px;">
      <span class="node-meta">${node.layer} · ${familyLabel(node.family)}</span>
      <h3>${node.label}</h3>
      <p>${node.summary}</p>
      <div class="node-marks">${implementationMarks(node, "node-mark")}</div>
    </button>`;
  }).join("");

  nodeLayer.querySelectorAll(".node-card").forEach((button) => {
    button.addEventListener("click", () => {
      state.selected = button.dataset.id;
      render();
    });
  });

  edgeLayer.innerHTML = data.edges
    .filter((edge) => visibleIds.has(edge.source) && visibleIds.has(edge.target))
    .filter((edge) => edge.type === "hierarchy" || (active.has(edge.source) && active.has(edge.target)))
    .map((edge) => {
      const from = layout.positions.get(edge.source);
      const to = layout.positions.get(edge.target);
      if (!from || !to) return "";
      const x1 = from.x + CARD_WIDTH;
      const y1 = from.y + CARD_HEIGHT / 2;
      const x2 = to.x;
      const y2 = to.y + CARD_HEIGHT / 2;
      const mid = (x1 + x2) / 2;
      const emphasis = edge.type !== "hierarchy" || (active.has(edge.source) && active.has(edge.target));
      const dim = active.size && !active.has(edge.source) && !active.has(edge.target);
      return `<path class="edge-line ${emphasis ? "emphasis" : ""} ${dim ? "dim" : ""}" d="M ${x1} ${y1} C ${mid} ${y1}, ${mid} ${y2}, ${x2} ${y2}" />`;
    }).join("");

  const view = currentView();
  q("graphHint").textContent = state.search ? `搜尋結果 ${visible.length}` : `${view.description} · ${visible.length} 個節點`;
  return active;
};

const render = () => {
  const visible = visibleNodes();
  const active = renderGraph(visible);
  renderSummary(visible, active);
  renderDetail();
  document.querySelectorAll(".preset-button").forEach((button) => button.classList.toggle("active", state.mode === "preset" && button.dataset.id === state.preset));
  document.querySelectorAll(".view-tab").forEach((button) => button.classList.toggle("active", button.dataset.id === state.workspaceView));
};

q("searchInput").addEventListener("input", (event) => { state.search = event.target.value.trim().toLowerCase(); render(); });
q("modeSelect").addEventListener("change", (event) => { state.mode = event.target.value; render(); });
q("layerSelect").addEventListener("change", (event) => { state.layer = event.target.value; render(); });
q("familySelect").addEventListener("change", (event) => {
  state.family = event.target.value;
  if (state.family) {
    state.mode = "family";
    q("modeSelect").value = "family";
  }
  render();
});
q("tagSelect").addEventListener("change", (event) => {
  state.tag = event.target.value;
  if (state.tag) {
    state.mode = "tag";
    q("modeSelect").value = "tag";
  }
  render();
});
q("useCaseSelect").addEventListener("change", (event) => {
  state.useCase = event.target.value;
  if (state.useCase) {
    state.mode = "use_case";
    q("modeSelect").value = "use_case";
  }
  render();
});

render();





</script>
</body>
</html>
