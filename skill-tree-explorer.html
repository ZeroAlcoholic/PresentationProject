    .controls{display:grid;gap:10px}.control{display:grid;gap:6px}.control label{font-size:.76rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}select{padding:11px 12px;border:1px solid var(--line);border-radius:14px;background:#fff}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{padding:8px 10px;border:1px solid var(--line);border-radius:999px;background:#fff;cursor:pointer}.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .hero{padding:22px 24px;border:1px solid var(--soft);border-radius:28px;background:linear-gradient(140deg,rgba(255,255,255,.94),rgba(248,243,234,.84));box-shadow:var(--shadow);display:grid;gap:12px}.hero h2{font-size:1.72rem;line-height:1.08}.pillrow,.badges{display:flex;flex-wrap:wrap;gap:8px}.pill,.badges span{padding:8px 10px;border:1px solid var(--line);border-radius:999px;background:#fff;font-size:.82rem;color:var(--muted)}
    .layout{display:grid;grid-template-columns:minmax(0,1.25fr) 360px;gap:18px}.treepanel,.detail{padding:20px;border:1px solid var(--soft);border-radius:28px;background:rgba(252,250,244,.88);box-shadow:var(--shadow)}.treepanel{display:grid;gap:16px}.forest{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}.branch{padding:16px;border:1px solid var(--soft);border-radius:22px;background:linear-gradient(180deg,rgba(255,255,255,.84),rgba(248,243,234,.92))}.branch h3{font-size:1rem}.tree{list-style:none;margin:12px 0 0;padding:0 0 0 18px;display:grid;gap:10px}.tree li{position:relative;display:grid;gap:8px}.tree li::before{content:"";position:absolute;left:-12px;top:-10px;bottom:8px;width:1px;background:var(--soft)}.tree li::after{content:"";position:absolute;left:-12px;top:22px;width:10px;height:1px;background:var(--soft)}
    .node{width:100%;text-align:left;padding:11px 12px;border:1px solid var(--soft);border-radius:16px;background:#fff;cursor:pointer;transition:.18s ease}.node:hover{transform:translateY(-1px)}.node strong{display:block;font-size:.93rem}.node span{display:block;margin-top:4px;font-size:.82rem;color:var(--muted)}.node small{display:inline-flex;margin-top:8px;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--warm)}.node.active{border-color:var(--accent);box-shadow:0 16px 30px rgba(11,93,122,.16);background:linear-gradient(180deg,rgba(11,93,122,.08),#fff)}.node.related{background:#fff7ef;border-color:rgba(155,93,45,.24)}.node.dim{opacity:.18;box-shadow:none}
    .detail{display:grid;gap:14px;position:sticky;top:24px;height:max-content}.detail .lead{color:var(--muted);line-height:1.7}.section{display:grid;gap:8px}.section h4{font-size:.76rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}.list{display:grid;gap:6px;padding-left:18px;margin:0;color:var(--muted);line-height:1.58}.list li{margin:0}.note{padding:14px;border-radius:18px;background:linear-gradient(180deg,rgba(155,93,45,.08),rgba(255,255,255,.8));border:1px solid rgba(155,93,45,.16);color:#7a4c29}
    @media (max-width:1100px){.page{grid-template-columns:1fr}.side{border-right:none;border-bottom:1px solid var(--soft)}.layout{grid-template-columns:1fr}.detail{position:static}}@media (max-width:760px){.main,.side{padding:16px}.hero h2{font-size:1.46rem}}

  "technique_cards": {
    "native-pdf": {
      "definition": "原生 PDF 文字層解析",
      "mechanism": "直接取字元、文字塊、座標",
      "evaluation_metrics": [
        "抽字正確率",
        "閱讀順序"
      ]
    },
    "quality-gate": {
      "definition": "文件品質與分流",
      "mechanism": "判斷 blur、反光、截切、旋轉",
      "evaluation_metrics": [
        "quality recall",
        "低誤殺率"
      ]
    },
    "printed-ocr": {
      "definition": "印刷文字辨識",
      "mechanism": "輸出文字、bbox、confidence",
      "evaluation_metrics": [
        "CER",
        "WER",
        "欄位命中"
      ]
    },
    "handwriting-htr": {
      "definition": "手寫文字辨識與文件級切行問題",
      "mechanism": "結合切行、ROI、語言模型與序列辨識處理連筆與潦草字",
      "evaluation_metrics": [
        "CER",
        "WER",
        "手寫欄位命中"
      ],
      "engineering_notes": [
        "line-level 與 document-level HTR 要分開看",
        "若切行不穩，辨識器再強也會失真"
      ]
    },
    "layout-segmentation": {
      "definition": "版面區塊切分",
      "mechanism": "輸出 block、class、role",
      "evaluation_metrics": [
        "mAP",
        "區塊正確率"
      ]
    },
    "reading-order": {
      "definition": "閱讀順序排序",
      "mechanism": "把 block 與文字串成正確閱讀流",
      "evaluation_metrics": [
        "order accuracy"
      ]
    },
    "table-structure": {
      "definition": "表格轉 cell grid / HTML 的結構辨識",
      "mechanism": "先找表格區，再推 row、col、cell 與 rowspan/colspan 關係",
      "evaluation_metrics": [
        "TEDS",
        "table mAP"
      ],
      "engineering_notes": [
        "表格 detection 與 structure 要分開驗收",
        "商務文件表格域轉移要另外測"
      ]
    },
    "key-value-extraction": {
      "definition": "欄位與實體擷取",
      "mechanism": "結合文字、座標、版面做 KIE",
      "evaluation_metrics": [
        "entity F1",
        "欄位 exact match"
      ]
    },
    "document-parsing": {
      "definition": "文件轉 JSON / Markdown / HTML",
      "mechanism": "整合 OCR、表格、版面輸出",
      "evaluation_metrics": [
        "結構完整度",
        "段落保真度"
      ]
    },
    "query-extraction": {
      "definition": "問題導向欄位擷取",
      "mechanism": "針對少量欄位做 query-based extraction",
      "evaluation_metrics": [
        "answer coverage",
        "field exact match"
      ]
    },
    "ocr-free": {
      "definition": "OCR-free 文件理解",
      "mechanism": "影像直出結構化結果",
      "evaluation_metrics": [
        "field F1",
        "evidence coverage"
      ]
    },
    "layout-aware-llm": {
      "definition": "讓 LLM 使用 OCR tokens、bbox 與 layout roles 進行抽取與推理",
      "mechanism": "把文字與空間訊號整理成提示或結構輸入，提升多區塊推理能力",
      "evaluation_metrics": [
        "field F1",
        "推理穩定度"
      ],
      "engineering_notes": [
        "要嚴格控制 hallucination 與 token budget",
        "最好保留來源位置，避免生成不可追溯結論"
      ]
    },
    "deployment-governance": {
      "definition": "部署與治理",
      "mechanism": "設定 edge / cloud、fallback、人工覆核",
      "evaluation_metrics": [
        "SLA",
        "覆核率",
        "失敗分流率"
      ]
    },
    "datasets-benchmarks": {
      "definition": "資料集與 benchmark 盤點",
      "mechanism": "對應 layout、table、KIE、VQA、parsing 評測",
      "evaluation_metrics": [
        "benchmark coverage"
      ]
    },
    "document-vqa": {
      "definition": "以問題驅動文件抽取與推理",
      "mechanism": "輸入文件與 query，輸出答案並盡量保留 evidence",
      "evaluation_metrics": [
        "accuracy",
        "ANLS"
      ],
      "engineering_notes": [
        "適合欄位少、版型多的情境",
        "若無 evidence，答對也不等於可稽核"
      ]
    },
    "omnidocbench": {
      "definition": "多來源 document parsing benchmark",
      "mechanism": "同時比較 pipeline-based 與 end-to-end 路線，並用多層級框架評估",
      "evaluation_metrics": [
        "multi-level parsing score",
        "文件類型分層結果"
      ],
      "engineering_notes": [
        "適合做整體 parsing 路線比較",
        "不能只看總分，還要看文件類型切片"
      ]
    },
    "document-classification": {
      "definition": "先辨識文件類型，再決定最合適的解析管線",
      "mechanism": "用文件類別或版型訊號做 routing，決定 Native PDF、OCR、KIE 或場景 processor",
      "evaluation_metrics": [
        "route accuracy",
        "誤分流率"
      ],
      "engineering_notes": [
        "分類錯誤會把整條處理鏈帶歪",
        "應和 use-case schema 一起驗收，不要只看分類準確率"
      ]
    },
    "form-elements": {
      "definition": "表單中的 checkbox、selection mark、簽章與條碼等非純文字元素",
      "mechanism": "先偵測元素位置，再做有無、狀態與對應欄位判讀",
      "evaluation_metrics": [
        "element recall",
        "selection mark accuracy"
      ],
      "engineering_notes": [
        "非文字元素必須保留幾何位置，否則難以對回欄位",
        "和 KIE 一起驗收比單獨看 detection 更有意義"
      ]
    },
    "retrieval-ready-output": {
      "definition": "把 parsing 結果整理成可索引、可引用、可回溯的片段",
      "mechanism": "輸出 chunk、anchor、來源位置與結構關係，供檢索與下游推理使用",
      "evaluation_metrics": [
        "檢索覆蓋率",
        "來源可回溯率"
      ],
      "engineering_notes": [
        "這是解析之後的輸出設計，不是主技能樹主幹",
        "若 chunk 切錯，後續檢索與回答品質會一起下降"
      ]
    },
    "docvqa-metrics": {
      "definition": "Document VQA 的問題導向評測",
      "mechanism": "依題型測 accuracy、ANLS，並另看 evidence 與問題分層表現",
      "evaluation_metrics": [
        "accuracy",
        "ANLS"
      ],
      "engineering_notes": [
        "查字題與結構推理題要分開驗收",
        "只看最終答案分數會掩蓋 evidence 問題"
      ]
    },
    "table-detection": {
      "definition": "先找出表格區域，再交給後續結構辨識",
      "mechanism": "在頁面層輸出 table bbox 或 polygon，供後續 TSR 使用",
      "evaluation_metrics": [
        "table mAP"
      ],
      "engineering_notes": [
        "table detection 與 table structure 必須拆開驗收",
        "多表格頁面與旋轉表格要另外切 slice 檢查"
      ]
    }
  }

    const topBranches=children.get(data.metadata.root_id)||[];const tagSet=[...new Set(data.nodes.flatMap(n=>n.tags||[]))].sort((a,b)=>tagLabel(a).localeCompare(tagLabel(b),'zh-Hant'));const useCaseSet=[...new Set(data.nodes.flatMap(n=>n.use_cases||[]))].sort((a,b)=>useCaseLabel(a).localeCompare(useCaseLabel(b),'zh-Hant'));const el=id=>document.getElementById(id);
    const ancestors=id=>{const list=[];let cur=nodes.get(id);while(cur&&cur.parent){list.push(cur.parent);cur=nodes.get(cur.parent);}return list;};
    const descendants=id=>{const set=new Set([id]);(children.get(id)||[]).forEach(child=>descendants(child).forEach(v=>set.add(v)));return set;};
    const directDependents=id=>data.nodes.filter(node=>(node.dependencies||[]).includes(id)).map(node=>node.id);const presetMatches=preset=>new Set(preset.focus.nodes||[]);
    const activeSet=()=>{const node=nodes.get(state.selected);if(!node)return new Set();if(node.id===data.metadata.root_id&&state.mode==='selected')return new Set([node.id]);if(state.mode==='subtree'){const set=descendants(node.id);ancestors(node.id).forEach(id=>set.add(id));return set;}if(state.mode==='family')return new Set(data.nodes.filter(item=>item.family===node.family).map(item=>item.id));if(state.mode==='layer')return new Set(data.nodes.filter(item=>item.layer===node.layer).map(item=>item.id));if(state.mode==='tag'&&state.tag)return new Set(data.nodes.filter(item=>(item.tags||[]).includes(state.tag)).map(item=>item.id));if(state.mode==='use_case'&&state.useCase)return new Set(data.nodes.filter(item=>(item.use_cases||[]).includes(state.useCase)).map(item=>item.id));if(state.mode==='preset'&&state.preset){const preset=data.highlight_presets.find(item=>item.id===state.preset);return preset?presetMatches(preset):new Set([node.id]);}const set=new Set([node.id]);ancestors(node.id).forEach(id=>set.add(id));(children.get(node.id)||[]).forEach(id=>set.add(id));(node.dependencies||[]).forEach(id=>set.add(id));directDependents(node.id).forEach(id=>set.add(id));return set;};
    const badgeHTML=(items,mapFn,fallback='未填')=>(items&&items.length?items:[fallback]).map(v=>`<span>${mapFn?mapFn(v):v}</span>`).join('');
    const listHTML=(items,fallback='未填')=>(items&&items.length?items:[fallback]).slice(0,4).map(v=>`<li>${v}</li>`).join('');
    const renderNode=id=>{const node=nodes.get(id),active=activeSet(),isActive=active.has(id)||id===state.selected,kids=children.get(id)||[];return `<li><button class="node ${id===state.selected?'active':''} ${active.size&&!isActive?'dim':''} ${isActive&&id!==state.selected?'related':''}" data-id="${id}"><strong>${node.label}</strong><span>${node.summary}</span><small>${node.layer} · ${familyLabel(node.family)}</small></button>${kids.length?`<ul class="tree">${kids.map(child=>renderNode(child)).join('')}</ul>`:''}</li>`;};
    const renderForest=()=>{el('forest').innerHTML=topBranches.map(id=>{const node=nodes.get(id);return `<section class="branch"><p class="eyebrow">${familyLabel(node.family)}</p><h3>${node.label}</h3><ul class="tree">${renderNode(id)}</ul></section>`;}).join('');el('forest').querySelectorAll('.node').forEach(btn=>btn.addEventListener('click',()=>{state.selected=btn.dataset.id;render();}));};
    const renderDetail=()=>{const node=nodes.get(state.selected);const card=data.technique_cards?.[node.id]||{};const risks=[...(node.weaknesses||[]),...(node.failure_modes||[])];const signals=[...(node.output||[]),...(node.evaluation_metrics||[]),...(card.evaluation_metrics||[])];el('title').textContent=node.label;el('summary').textContent=card.definition||node.summary;el('tags').innerHTML=badgeHTML(node.tags,tagLabel,'尚未標記');el('signals').innerHTML=badgeHTML([...new Set(signals)],null,'未定義');el('strengths').innerHTML=listHTML(node.strengths,'待補');el('risks').innerHTML=listHTML(risks,'待補');el('uses').innerHTML=badgeHTML(node.use_cases,useCaseLabel,'未指定');el('refs').innerHTML=badgeHTML(node.references,null,'共享資料');el('cardNote').textContent=node.id===data.metadata.root_id?(data.metadata.whitepaper_axes||[]).map(a=>`${a.label}：${a.summary}`).join(' / '):(card.engineering_notes||[`機制：${card.mechanism||'依賴 ${node.dependencies?.length||0}，子節點 ${(children.get(node.id)||[]).length}。'}`]).join(' / ');};
    const renderChrome=()=>{const node=nodes.get(state.selected);el('heroTitle').textContent=node.label;el('heroPills').innerHTML=[`層級 ${node.layer}`,`家族 ${familyLabel(node.family)}`,`指標 ${(node.evaluation_metrics||[]).length}`,`聚焦 ${(activeSet().size||1)}`].map(i=>`<span class="pill">${i}</span>`).join('');el('stats').innerHTML=[[data.nodes.length,'節點'],[topBranches.length,'主幹'],[data.highlight_presets.length,'視角'],[(children.get(node.id)||[]).length,'子節點']].map(([v,l])=>`<div class="stat"><strong>${v}</strong><span>${l}</span></div>`).join('');};
    const renderControls=()=>{el('mode').innerHTML=[['selected',viewModeLabels.selected||'鄰近關聯'],['subtree',viewModeLabels.subtree||'子樹'],['family',viewModeLabels.family||'技術家族'],['layer',viewModeLabels.layer||'層級'],['tag',viewModeLabels.tag||'技術標記'],['use_case',viewModeLabels.use_case||'應用場景'],['preset',viewModeLabels.preset||'預設視角']].map(([v,l])=>`<option value="${v}">${l}</option>`).join('');el('mode').value=state.mode;el('tag').innerHTML=`<option value="">全部技術標記</option>${tagSet.map(tag=>`<option value="${tag}">${tagLabel(tag)}</option>`).join('')}`;el('tag').value=state.tag;el('useCase').innerHTML=`<option value="">全部應用場景</option>${useCaseSet.map(v=>`<option value="${v}">${useCaseLabel(v)}</option>`).join('')}`;el('useCase').value=state.useCase;el('presets').innerHTML=data.highlight_presets.map(p=>`<button class="chip ${state.mode==='preset'&&state.preset===p.id?'active':''}" data-id="${p.id}" title="${p.description}">${p.label}</button>`).join('');el('presets').querySelectorAll('.chip').forEach(btn=>btn.addEventListener('click',()=>{state.mode='preset';state.preset=btn.dataset.id;render();}));el('mode').onchange=e=>{state.mode=e.target.value;render();};el('tag').onchange=e=>{state.tag=e.target.value;state.mode='tag';render();};el('useCase').onchange=e=>{state.useCase=e.target.value;state.mode='use_case';render();};};
    const render=()=>{renderControls();renderChrome();renderForest();renderDetail();};render();
  </script>
</body>
</html>
